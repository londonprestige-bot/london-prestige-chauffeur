<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Booking | London Prestige Chauffeur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Google Map Elements Styling to match Luxury Dark Theme */
        .pac-container {
            background-color: #1c1c1e !important;
            border: 1px solid #2c2c2e !important;
            font-family: sans-serif;
        }

        .pac-item {
            color: #ffffff !important;
            border-top: 1px solid #2c2c2e !important;
            padding: 10px !important;
            cursor: pointer;
        }

        .pac-item:hover {
            background-color: #2c2c2e !important;
        }

        .pac-item-query {
            color: #ff6600 !important;
        }
    </style>
</head>

<body class="bg-[#111111] text-white font-sans antialiased">

    <!-- Header Banner -->
    <div class="bg-black text-center py-16 border-b border-zinc-900">
        <h1 class="text-4xl font-bold tracking-tight mb-2">Make Your Reservation</h1>
        <p class="text-xs text-zinc-500 uppercase tracking-widest">Live Route & Distance Calculator</p>
    </div>

    <!-- Main Booking Interface -->
    <div class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

            <!-- Left Column: Form Inputs -->
            <div class="lg:col-span-5 bg-black rounded-xl border border-zinc-900 shadow-2xl overflow-hidden">
                <div class="p-6 bg-zinc-950 border-b border-zinc-900">
                    <h2 class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days text-[#ff6600]"></i> 1. Enter Ride Details
                    </h2>
                </div>

                <div class="p-6 space-y-5">
                    <!-- Date and Time Row -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[11px] uppercase tracking-wider text-zinc-400 font-semibold">Pickup
                                Date</label>
                            <input type="date"
                                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ff6600]">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] uppercase tracking-wider text-zinc-400 font-semibold">Pickup
                                Time</label>
                            <input type="time"
                                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ff6600]">
                        </div>
                    </div>

                    <!-- Pickup Location Input -->
                    <div class="space-y-1 relative">
                        <label class="text-[11px] uppercase tracking-wider text-zinc-400 font-semibold">Pickup
                            Address</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3.5 text-zinc-500 text-sm"><i
                                    class="fa-solid fa-location-dot"></i></span>
                            <input id="pickup-input" type="text" placeholder="Enter pickup location in London"
                                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 pl-10 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-[#ff6600]">
                        </div>
                    </div>

                    <!-- Drop-off Location Input -->
                    <div class="space-y-1 relative">
                        <label class="text-[11px] uppercase tracking-wider text-zinc-400 font-semibold">Drop-off
                            Address</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3.5 text-zinc-500 text-sm"><i
                                    class="fa-solid fa-flag-checkered"></i></span>
                            <input id="dropoff-input" type="text" placeholder="Enter drop-off destination"
                                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 pl-10 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-[#ff6600]">
                        </div>
                    </div>

                    <!-- Action Button to Trigger Route -->
                    <button id="calc-route-btn"
                        class="w-full py-4 bg-[#ff6600] text-white font-bold text-sm uppercase tracking-wider rounded-lg hover:bg-[#e05500] transition shadow-lg shadow-[#ff6600]/10 cursor-pointer flex items-center justify-center gap-2">
                        Calculate Live Route <i class="fa-solid fa-route"></i>
                    </button>
                </div>
            </div>

            <!-- Right Column: Live Map & Live Stats -->
            <div class="lg:col-span-7 space-y-6">
                <!-- Live Google Map Container -->
                <div id="map"
                    class="w-full h-[400px] bg-zinc-900 rounded-xl border border-zinc-800 shadow-2xl overflow-hidden">
                    <!-- Google Map element will load here dynamically -->
                </div>

                <!-- Realtime Trip Live Dashboard Matrix -->
                <div class="grid grid-cols-2 gap-4 bg-black p-5 rounded-xl border border-zinc-900">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-full border border-[#ff6600]/20 flex items-center justify-center text-[#ff6600] bg-[#ff6600]/5">
                            <i class="fa-solid fa-road"></i>
                        </div>
                        <div>
                            <span
                                class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold block">Distance</span>
                            <span id="distance-output" class="text-xl font-bold text-white">0.0 mi</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-full border border-[#ff6600]/20 flex items-center justify-center text-[#ff6600] bg-[#ff6600]/5">
                            <i class="fa-regular fa-clock"></i>
                        </div>
                        <div>
                            <span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold block">Est.
                                Duration</span>
                            <span id="duration-output" class="text-xl font-bold text-white">0 mins</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Google Maps API Implementation Script -->
    <script>
        let map, directionsService, directionsRenderer;
        let autocompletePickup, autocompleteDropoff;

        function initMap() {
            // Initialize Services
            directionsService = new google.maps.DirectionsService();

            // Custom Styles for Premium Dark Map Layout
            const darkMapStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
                { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#212121" }] },
                { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "color": "#757575" }] },
                { "featureType": "road", "elementType": "geometry.fill", "stylers": [{ "color": "#2c2c2c" }] },
                { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#1f1f1f" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }
            ];

            // Load Standard Center (London Area coordinates)
            const londonCenter = { lat: 51.5074, lng: -0.1278 };
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 11,
                center: londonCenter,
                styles: darkMapStyle,
                disableDefaultUI: true,
                zoomControl: true
            });

            // Configure Directions Renderer to Plot Route Polyline on Map
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                polylineOptions: {
                    strokeColor: "#ff6600",
                    strokeOpacity: 0.8,
                    strokeWeight: 5
                }
            });

            // Attach Autocomplete Filters to Search Bars
            const options = { componentRestrictions: { country: "uk" } };
            autocompletePickup = new google.maps.places.Autocomplete(document.getElementById("pickup-input"), options);
            autocompleteDropoff = new google.maps.places.Autocomplete(document.getElementById("dropoff-input"), options);

            // Trigger calculation click event
            document.getElementById('calc-route-btn').addEventListener('click', calculateAndDisplayRoute);
        }

        function calculateAndDisplayRoute() {
            const origin = document.getElementById("pickup-input").value;
            const destination = document.getElementById("dropoff-input").value;

            if (!origin || !destination) {
                alert("Please enter both pickup and drop-off addresses.");
                return;
            }

            directionsService.route(
                {
                    origin: origin,
                    destination: destination,
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.IMPERIAL // Outputs values in Miles
                },
                (response, status) => {
                    if (status === "OK") {
                        // Plot visual path route line instantly on screen map element
                        directionsRenderer.setDirections(response);

                        // Extract numeric metrics parameters data values safely
                        const routeData = response.routes[0].legs[0];
                        document.getElementById("distance-output").innerText = routeData.distance.text;
                        document.getElementById("duration-output").innerText = routeData.duration.text;
                    } else {
                        alert("Directions request failed due to " + status);
                    }
                }
            );
        }
    </script>

    <!-- Google Maps API Script Loader -->
    <!-- NOTE: Replace "YOUR_API_KEY" with an actual active Google Cloud API key to run without developer watermark -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap" async
        defer></script>

</body>

</html>
